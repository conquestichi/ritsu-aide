name: Deploy to VPS

on:
  push:
    branches: [main]
    paths:
      - 'line/**'

jobs:
  deploy-ritsu-line:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy ritsu_line.py
        run: |
          scp -i ~/.ssh/deploy_key \
            line/ritsu_line.py line/shared_knowledge.py \
            root@${{ secrets.VPS_HOST }}:/opt/ritsu-line/

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.VPS_HOST }} \
            "systemctl restart ritsu-line && systemctl is-active ritsu-line"
